name: Ndiso Designs 24/7 Stream

on:
  schedule:
    # This runs every 6 hours (04:00, 10:00, 16:00, 22:00 UTC)
    # In South Africa (SAST), this is 06:00, 12:00, 18:00, 00:00.
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch: # Allows you to start it manually for testing

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Determine Video Shift
        run: |
          # We add 2 hours to UTC to get South African Time
          HOUR=$(date -u -d "+2 hours" +%H)
          echo "Current SA Hour: $HOUR"
          
          if [ "$HOUR" -ge 06 ] && [ "$HOUR" -lt 12 ]; then
            echo "VIDEO_FILE=mural_morning.mp4" >> $GITHUB_ENV
          elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
            echo "VIDEO_FILE=surface_patterns.mp4" >> $GITHUB_ENV
          elif [ "$HOUR" -ge 18 ] && [ "$HOUR" -lt 23 ]; then
            echo "VIDEO_FILE=main_portfolio.mp4" >> $GITHUB_ENV
          else
            echo "VIDEO_FILE=night_loop.mp4" >> $GITHUB_ENV
          fi

      - name: Start Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # This runs for 5 hours and 55 mins (21300 seconds) 
          # to prevent hitting the 6-hour GitHub wall.
          timeout 21300s ffmpeg -re -stream_loop -1 -i "$VIDEO_FILE" \
            -c:v libx264 -preset veryfast -b:v 3000k \
            -c:a aac -b:a 128k -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
